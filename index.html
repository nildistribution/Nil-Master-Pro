            const prod = products.find(p => p.id === pid);
            if (prod) {

        function getPermissionLabel(perm) { const labels = { dashboard: 'ড্যাশবোর্ড', orders: 'অর্ডার', delivery: 'ডেলিভারি',
                collection: 'বাকি ম্যানেজমেন্ট', challan: 'চালান', reports: 'রিপোর্ট', shops: 'দোকান', products: 'পণ্য',

                password: 'পাসওয়ার্ড', settings: 'সেটিংস' }; return labels[perm] || perm; }

        function toggleAllPermission(index, checked) { if (checked) users[index].permissions = ['all'];

        function updateUserPermission(index, perm, checked) {
            if (users[index].permissions.includes('all')) users[index].permissions = allPermissions.filter(p => p !== perm);
            if (checked) { if (!users[index].permissions.includes(perm)) users[index].permissions.push(perm); } else { users[
                    index].permissions = users[index].permissions.filter(p => p !== perm); }
            saveAll();
        }

        function changePassword() {
            const oldPass = document.getElementById('oldPassword').value;
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;
            if (!oldPass || !newPass || !confirmPass) { showToast('সব ফিল্ড পূরণ করুন', 'warning'); return; }
            if (currentUser.password !== oldPass) { showToast('বর্তমান পাসওয়ার্ড ভুল', 'danger'); return; }
            if (newPass !== confirmPass) { showToast('পাসওয়ার্ড মিলছে না', 'danger'); return; }
            if (newPass.length < 3) { showToast('পাসওয়ার্ড কমপক্ষে ৩ অক্ষরের হতে হবে', 'warning'); return; }
            const userIndex = users.findIndex(u => u.username === currentUser.username);
            if (userIndex >= 0) { users[userIndex].password = newPass;
                currentUser.password = newPass;
                saveAll();
                showToast('✅ পাসওয়ার্ড পরিবর্তন সফল', 'success');
                document.getElementById('oldPassword').value = '';
                document.getElementById('newPassword').value = '';
                document.getElementById('confirmPassword').value = ''; }
        }

        function changeOtherPassword() {
            const targetUsername = document.getElementById('targetUser')?.value;
            const newPass = document.getElementById('adminNewPassword')?.value;
            if (!targetUsername || !newPass) { showToast('ইউজার ও পাসওয়ার্ড দিন', 'warning'); return; }
            if (newPass.length < 3) { showToast('পাসওয়ার্ড কমপক্ষে ৩ অক্ষরের হতে হবে', 'warning'); return; }
            const userIndex = users.findIndex(u => u.username === targetUsername);
            if (userIndex >= 0) { users[userIndex].password = newPass;
                if (currentUser.username === targetUsername) currentUser.password = newPass;
                saveAll();
                showToast(`✅ ${users[userIndex].name} এর পাসওয়ার্ড পরিবর্তন সফল`, 'success');
                document.getElementById('adminNewPassword').value = ''; }
        }

        function addManager() {
            const name = document.getElementById('newManagerName').value.trim();
            if (!name) return;
            if (deliveryManagerDetails[name]) { showToast('এই নামে ম্যানেজার ইতিমধ্যে আছে', 'warning'); return; }
            const defaultRate = +document.getElementById('defaultDailyRate').value || 500;
            deliveryManagerDetails[name] = { totalDeliveries: 0, dailyRate: defaultRate, totalEarned: 0, paid: 0,
            history: [] };
            saveAll();
            renderDeliveryManager();
            showToast(`✅ ${name} যুক্ত হয়েছে`, 'success');
        }

        function payManager(name) {
            const d = deliveryManagerDetails[name];
            if (!d) return;
            const due = d.totalEarned - d.paid;
            if (due <= 0) { showToast('এই ম্যানেজারের কোনো পাওনা নেই', 'warning'); return; }
            const amount = +prompt(`বেতন পরিশোধ (সর্বোচ্চ ${due} টাকা):`, Math.min(due, 5000));
            if (!amount || amount <= 0 || amount > due) { showToast('সঠিক পরিমাণ দিন', 'warning'); return; }
            d.paid += amount;
            d.history.push({ date: getToday(), amount: amount });
            saveAll();
            renderDeliveryManager();
            showToast(`✅ ${name} - ${amount} ৳ পরিশোধিত`, 'success');
        }

            saveAll();
            renderDeliveryManager();
            showToast('✅ ম্যানেজার মুছে ফেলা হয়েছে', 'info'); }

        function exportAllData() {
            const fullData = { products, routes, routeNames, currentOrders, offers, productOffers, targets, deliveryData,
                deliveryManagers, deliveryManagerDetails, damageLog, deliverySchedule, printSettings, users, stockLog,
                incentiveSettings, invoiceCounter, debts, version: 2.1 };
            const blob = new Blob([JSON.stringify(fullData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `neel_backup_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('✅ ব্যাকআপ ডাউনলোড সম্পন্ন', 'success');
        }

        function importAllData(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.products) products = data.products;
                    if (data.routes) routes = data.routes;
                    if (data.routeNames) routeNames = data.routeNames;
                    if (data.currentOrders) currentOrders = data.currentOrders;
                    if (data.offers) offers = data.offers;
                    if (data.productOffers) productOffers = data.productOffers;
                    if (data.targets) targets = data.targets;
                    if (data.deliveryData) deliveryData = data.deliveryData;
                    if (data.deliveryManagers) deliveryManagers = data.deliveryManagers;
                    if (data.deliveryManagerDetails) deliveryManagerDetails = data.deliveryManagerDetails;
                    if (data.damageLog) damageLog = data.damageLog;
                    if (data.deliverySchedule) deliverySchedule = data.deliverySchedule;
                    if (data.printSettings) printSettings = data.printSettings;
                    if (data.users) users = data.users;
                    if (data.stockLog) stockLog = data.stockLog;
                    if (data.incentiveSettings) incentiveSettings = data.incentiveSettings;
                    if (data.invoiceCounter) invoiceCounter = data.invoiceCounter;
                    if (data.debts) debts = data.debts;
                    if (currentUser) { const found = users.find(u => u.username === currentUser.username); if (found)
                            currentUser = found;
                        else { currentUser = null;
                            localStorage.removeItem('fu'); } }
                    saveAll();
                    showToast('✅ ডাটা ইম্পোর্ট সম্পন্ন!', 'success');
                    location.reload();
                } catch (err) { showToast('❌ ইম্পোর্ট ব্যর্থ: ' + err.message, 'danger'); }
            };
            reader.readAsText(file);
        }

        function clearAllEntries() {
            if (!confirm('⚠️ আপনি কি নিশ্চিত?\n\nসমস্ত অর্ডার, ডেলিভারি, বাকি, ড্যামেজ ও স্টক লগ মুছে যাবে। পণ্য, দোকান, ইউজার, সেটিংস অক্ষত থাকবে।')) return;
            currentOrders = {};
            deliveryData = {};
            debts = {};
            damageLog = [];
            stockLog = [];
            saveAll();
            showToast('✅ ডাটা ক্লিন সম্পন্ন!', 'success');
        }

        // ================================================================
        // ৩০. অ্যাপ স্টার্টআপ
        // ================================================================

        if (!currentUser) {
            renderLogin();
        } else {
            renderTabNav();
            renderBottomNav();
            switchTab('dashboard');
        }
    </script>
</body>
</html>
